version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Optional: Python dev server for local development
  dev-server:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./public:/app/public
      - ./src:/app/src
    command: >
      sh -c "pip install serve -q &&
              cd /app/public &&
              serve -l 8000"
    ports:
      - "8000:8000"
