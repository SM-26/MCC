<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Merge & Choo-Choo - Station</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --accent: #ffd700;
      --text: #eee;
      --empty: #0f3460;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 15px;
      background: var(--panel);
      border-bottom: 2px solid var(--empty);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #money-display {
      font-size: 24px;
      color: var(--accent);
      font-weight: bold;
    }

    main {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .platform {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
    }

    .platform-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .platform-name {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent);
    }

    .train-slot {
      background: rgba(0, 0, 0, 0.3);
      border: 2px dashed var(--empty);
      border-radius: 8px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .train {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      padding: 10px;
      min-width: 200px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      font-weight: 700;
      cursor: pointer;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn.secondary {
      background: #4a90d9;
      color: white;
    }

    .btn.warn {
      background: #e67e22;
      color: white;
    }

    .route-info {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 8px;
    }

    #message {
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div id="money-display">$<span id="money">0</span></div>
      <div style="font-size: 12px; opacity: 0.7;">Station</div>
    </div>
    <div style="font-size: 12px; opacity: 0.7;">Platform Management</div>
  </header>

  <main>
    <div class="card">
      <strong>Station Status</strong>
      <div id="station-status"></div>
    </div>

    <div class="card">
      <strong>Platforms</strong>
      <div id="platforms-container"></div>
      <div id="message">Build a station first!</div>
    </div>

    <div class="card">
      <strong>Actions</strong>
      <button id="build-station-btn" class="btn">Build Station ($1000)</button>
      <button id="collect-btn" class="btn secondary">Collect All Payouts</button>
    </div>
  </main>

  <script type="module">
    import { loadSave, saveGame } from './src/save/save.js';

    // Load state
    let state = {};
    try {
      const saved = localStorage.getItem('mcc_save');
      if (saved) {
        state = JSON.parse(saved);
      }
    } catch (e) {
      console.error('Failed to load save:', e);
    }

    // Initialize station if not exists
    if (!state.station) {
      state.station = {
        built: false,
        platforms: []
      };
    }

    const station = state.station;
    const moneyEl = document.getElementById('money');
    const stationStatusEl = document.getElementById('station-status');
    const platformsContainerEl = document.getElementById('platforms-container');
    const messageEl = document.getElementById('message');
    const buildStationBtn = document.getElementById('build-station-btn');
    const collectBtn = document.getElementById('collect-btn');

    // Render station status
    function renderStationStatus() {
      if (!station.built) {
        stationStatusEl.innerHTML = '<strong>Status:</strong> Not built';
      } else {
        stationStatusEl.innerHTML = `
          <strong>Status:</strong> Active<br>
          <strong>Platforms:</strong> ${station.platforms.length}
        `;
      }
    }

    // Render platforms
    function renderPlatforms() {
      if (!station.built) {
        platformsContainerEl.innerHTML = '';
        return;
      }

      platformsContainerEl.innerHTML = '';

      station.platforms.forEach((platform, index) => {
        const platformEl = document.createElement('div');
        platformEl.className = 'platform';

        let trainHtml = '';
        if (platform.train) {
          trainHtml = `
            <div class="train">
              <strong>Train</strong><br>
              Level: ${platform.train.level}<br>
              Route: ${platform.route || 'None'}
            </div>
          `;
        } else {
          trainHtml = '<div class="train-slot">Empty Slot</div>';
        }

        platformEl.innerHTML = `
          <div class="platform-header">
            <span class="platform-name">Platform ${index + 1}</span>
            <span style="font-size: 12px; opacity: 0.7;">${platform.status || 'Idle'}</span>
          </div>
          ${trainHtml}
          <div class="route-info">
            <strong>Capacity:</strong> ${platform.capacity || 0}<br>
            <strong>Last Trip:</strong> ${platform.lastTrip || 'Never'}
          </div>
          <div style="margin-top: 8px;">
            <button class="btn" onclick="assignRoute(${index})">Assign Route</button>
            <button class="btn secondary" onclick="collectPayout(${index})">Collect</button>
          </div>
        `;

        platformsContainerEl.appendChild(platformEl);
      });
    }

    // Save state
    function saveState() {
      const saveData = { ...state, _version: 1 };
      localStorage.setItem('mcc_save', JSON.stringify(saveData));
    }

    // Render everything
    function render() {
      moneyEl.textContent = state.money;
      renderStationStatus();
      renderPlatforms();
    }

    // Event handlers
    buildStationBtn.onclick = () => {
      if (state.money >= 1000) {
        state.money -= 1000;
        station.built = true;
        station.platforms.push({
          id: 1,
          status: 'Idle',
          capacity: 0,
          lastTrip: null,
          train: null,
          route: null
        });
        messageEl.textContent = 'Station built!';
        saveState();
        render();
      } else {
        messageEl.textContent = 'Need $1000 to build station';
      }
    };

    collectBtn.onclick = () => {
      let total = 0;
      station.platforms.forEach(platform => {
        if (platform.payout) {
          total += platform.payout;
          platform.payout = null;
        }
      });
      
      if (total > 0) {
        state.money += total;
        messageEl.textContent = `Collected $${total}!`;
      } else {
        messageEl.textContent = 'No payouts to collect';
      }
      
      saveState();
      render();
    };

    // Expose functions to window for onclick handlers
    window.assignRoute = (index) => {
      messageEl.textContent = `Assigning route to platform ${index + 1}...`;
      // TODO: Implement route assignment
      saveState();
      render();
    };

    window.collectPayout = (index) => {
      if (station.platforms[index].payout) {
        state.money += station.platforms[index].payout;
        station.platforms[index].payout = null;
        messageEl.textContent = `Collected $${station.platforms[index].payout}!`;
        saveState();
        render();
      } else {
        messageEl.textContent = 'No payout to collect';
      }
    };

    // Auto-save every 5 seconds
    setInterval(saveState, 5000);

    // Initial render
    render();

    // Listen for storage changes
    window.addEventListener('storage', (e) => {
      if (e.key === 'mcc_save') {
        try {
          state = JSON.parse(e.newValue);
          render();
        } catch (err) {
          console.error('Failed to update from storage:', err);
        }
      }
    });
  </script>
</body>
</html>
