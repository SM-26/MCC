<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  
  <title>Merge & Choo-Choo</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash-screen">
    <div class="spinner"></div>
    <div class="splash-content">
      <h1 class="splash-title">Merge & Choo-Choo</h1>
      <p class="splash-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    </div>
  </div>

  <!-- Main App Container -->
  <main class="app-container" id="app">
    <!-- Navigation Bar -->
    <nav class="nav-bar nav-top" id="nav-bar">
      <button class="nav-tab active" data-tab="world" aria-label="World">🌍</button>
      <button class="nav-tab" data-tab="plot" aria-label="Plot">⛏️</button>
      <button class="nav-tab" data-tab="station" aria-label="Station">🚂</button>
      <button class="nav-tab" data-tab="settings" aria-label="Settings">⚙️</button>
    </nav>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- World Tab -->
      <section id="world" class="tab-content">
        <!-- World content will be loaded here -->
      </section>

      <!-- Plot Tab -->
      <section id="plot" class="tab-content">
        <!-- Plot content will be loaded here -->
      </section>

      <!-- Station Tab -->
      <section id="station" class="tab-content">
        <!-- Station content will be loaded here -->
      </section>

      <!-- Settings Tab -->
      <section id="settings" class="tab-content">
        <!-- General Settings Group -->
        <div class="settings-group">
          <h3>General</h3>
          
          <!-- Theme Toggle Button -->
          <button class="nav-toggle-btn theme-toggle-btn" aria-label="Toggle theme">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>

          <!-- Reset Save Data Button -->
          <button class="reset-button" id="reset-save">Reset Save Data</button>
          
          <!-- Nav Bar Toggle Button -->
          <button id="nav-toggle" class="nav-toggle-btn nav-bar-toggle-btn" aria-label="Toggle navigation position">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 6h13M8 12h13M8 18h13"/>
            </svg>
          </button>
        </div>

        <!-- Dev Mode Group -->
        <div class="settings-group">
          <h3>Developer</h3>
          
          <!-- Dev Mode Toggle -->
          <div class="switch-container">
            <span>Dev Mode</span>
            <label class="switch">
              <input type="checkbox" id="dev-mode-toggle">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Info Group -->
        <div class="settings-group">
          <h3>App Info</h3>
          
          <div class="version-info">
            <div id="app-version" class="version-text"></div>
            <div id="commit-hash" class="commit-hash">Loading...</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div id="toast" class="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
