<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge & Choo-Choo - Miner Loop MVP</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --accent: #ffd700;
            --rubble: #666;
            --dirt: #8b7355;
            --empty: #0f3460;
            --text: #eee
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation
        }

        header {
            padding: 15px;
            background: var(--panel);
            border-bottom: 2px solid var(--empty);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        #money-display {
            font-size: 24px;
            color: var(--accent);
            font-weight: bold
        }

        #stats-display {
            font-size: 14px;
            text-align: right;
            opacity: .8
        }

        nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, .2)
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px
        }

        .nav-btn {
            padding: 8px;
            background: var(--empty);
            border: 1px solid #ffffff33;
            color: #fff;
            border-radius: 4px;
            width: 100%;
            font-size: 12px
        }

        .nav-btn:disabled {
            opacity: .3
        }

        #game-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px
        }

        #tile-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            touch-action: none
        }

        .tile {
            background: var(--empty);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: transform .1s
        }

        .tile.rubble {
            background: var(--rubble);
            border: 2px solid #888
        }

        .tile.dirt {
            background: var(--dirt);
            border: 2px solid #a68b6a
        }

        .tile.empty {
            border: 1px dashed #444
        }

        .tile.drag-over {
            background: rgba(255, 215, 0, .2)
        }

        .hp-bar {
            position: absolute;
            bottom: 4px;
            left: 4px;
            right: 4px;
            height: 4px;
            background: rgba(0, 0, 0, .5);
            border-radius: 2px;
            display: none
        }

        .hp-fill {
            height: 100%;
            background: #f44;
            border-radius: 2px;
            transition: width .1s
        }

        .miner {
            position: absolute;
            width: 80%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform .2s cubic-bezier(.175, .885, .32, 1.275);
            cursor: grab
        }

        .miner.selected {
            filter: drop-shadow(0 0 5px var(--accent));
            transform: scale(1.15);
            z-index: 20
        }

        .miner:active {
            cursor: grabbing
        }

        .miner-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block
        }

        .miner-level {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--accent);
            color: #000;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            font-weight: bold
        }

        .float-text {
            position: absolute;
            color: var(--accent);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 100
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1
            }

            100% {
                transform: translateY(-50px);
                opacity: 0
            }
        }

        footer {
            padding: 20px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .main-btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            background: linear-gradient(180deg, #4CAF50 0%, #2e7d32 100%);
            box-shadow: 0 4px 0 #1b5e20
        }

        .main-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1b5e20
        }

        .main-btn:disabled {
            filter: grayscale(1);
            opacity: .5;
            cursor: not-allowed
        }
    </style>
</head>

<body>
    <header>
        <div id="money-display">$0</div>
        <div id="stats-display">
            <div id="loc-text">Plot 1, Depth 0</div>
            <div id="clear-text">Cleared: 0%</div>
        </div>
    </header>
    <nav>
        <div class="nav-group"><button class="nav-btn" onclick="navPlot(-1)">◀ Prev Plot</button><button class="nav-btn"
                onclick="navPlot(1)">Next Plot ▶</button></div>
        <div class="nav-group"><button class="nav-btn" onclick="navDepth(-1)">▲ Go Up</button><button class="nav-btn"
                onclick="navDepth(1)">Go Down ▼</button></div>
        <div class="nav-group"><button id="btn-buy-north" class="nav-btn" onclick="buyNorthPlot()"
                style="background:var(--accent);color:#000;">Buy North Plot</button><button id="btn-dig-down"
                class="nav-btn" onclick="digDown()" style="background:#2196F3;">Dig Deeper</button></div>
    </nav>
    <main id="game-view">
        <div id="tile-grid"></div>
    </main>
    <footer><button id="btn-buy-miner" class="main-btn" onclick="buyMiner()">Buy Miner (Lvl 1) - $50</button>
        <div style="font-size:12px;text-align:center;opacity:.6;">Select miner to move or merge</div>
    </footer>
    <script>
        const KEY = 'mcc_save', GRID_SIZE = 5, BASE_MINER_COST = 50, RUBBLE_VALUE = 25, TICK_RATE = 100, OFFLINE_RATE = 0.5;
        const defaultState = { money: 200, activePlot: 0, maxUnlockedPlot: 0, plots: [{ depth: 0, tiles: [], miners: [] }], selectedMiner: null, draggedMiner: null, lastTick: Date.now(), worldDiscovered: ['plot-0'], playerPlotId: 'plot-0' };
        let state = loadGame();
        function clone(v) { return JSON.parse(JSON.stringify(v)) }
        function initPlot(depth = 0) { const tiles = []; for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) { const row = Math.floor(i / GRID_SIZE), bottom = row === GRID_SIZE - 1, level = depth + 1, type = bottom ? 'empty' : (Math.random() > 0.4 ? 'rubble' : 'dirt'), isRubble = type === 'rubble'; tiles.push({ type, level, hp: type === 'empty' ? 0 : (isRubble ? 50 + depth * 25 : 20 + depth * 10), maxHp: type === 'empty' ? 0 : (isRubble ? 50 + depth * 25 : 20 + depth * 10) }) } return { depth, tiles, miners: [] } }
        function normalizePlot(plot) { if (!plot.tiles || !plot.tiles.length) plot.tiles = initPlot(plot.depth || 0).tiles; if (!plot.miners) plot.miners = []; plot.miners = plot.miners.filter(m => plot.tiles[m.tileIndex] && plot.tiles[m.tileIndex].type === 'empty'); plot.miners.forEach(m => { m.level = Number(m.level || 1); m.tileIndex = Number(m.tileIndex || 0); m.facing = Number(m.facing || 0) }); const occupied = new Set(); plot.miners = plot.miners.filter(m => { if (occupied.has(m.tileIndex)) return false; occupied.add(m.tileIndex); return true }) }
        function loadGame() { try { const saved = JSON.parse(localStorage.getItem(KEY) || '{}'); const s = Object.assign(clone(defaultState), saved); s.money = Number(s.money ?? 100); s.activePlot = Number(s.activePlot ?? 0); s.maxUnlockedPlot = Number(s.maxUnlockedPlot ?? 0); s.plots = s.plots && s.plots.length ? s.plots : [initPlot(0)]; s.plots.forEach(p => { p.depth = Number(p.depth ?? 0); normalizePlot(p) }); if (s.activePlot < 0) s.activePlot = 0; if (s.activePlot > s.plots.length - 1) s.activePlot = 0; handleOfflineProgress(s); return s } catch { return clone(defaultState) } }
        function persist() { localStorage.setItem(KEY, JSON.stringify(state)) }
        function ensureBounds() { if (!state.plots.length) state.plots.push(initPlot(0)); if (state.activePlot < 0) state.activePlot = 0; if (state.activePlot > state.plots.length - 1) state.activePlot = state.plots.length - 1; if (state.maxUnlockedPlot > state.plots.length - 1) state.maxUnlockedPlot = state.plots.length - 1 }
        function gameTick() { const now = Date.now(), dt = (now - state.lastTick) / 1000; state.lastTick = now; state.plots.forEach(plot => plot.miners.forEach(miner => updateMiner(miner, plot, dt))); renderAll() }
        function updateMiner(miner, plot, dt) { const idx = findTarget(miner, plot); if (idx === null) return; const target = plot.tiles[idx], dmg = Math.pow(2, miner.level - 1) * 5 * dt; miner.facing = getFacing(miner.tileIndex, idx); target.hp -= dmg; if (target.hp <= 0) { if (target.type === 'rubble') { const val = RUBBLE_VALUE * (plot.depth + 1); state.money += val; spawnFloatText(idx, `+$${val}`) } target.type = 'empty'; target.hp = 0; persist() } }
        function findTarget(miner, plot) { const n = getNeighbors(miner.tileIndex).filter(i => plot.tiles[i].type !== 'empty'); if (!n.length) return null; n.sort((a, b) => { const A = plot.tiles[a], B = plot.tiles[b]; if (A.type !== B.type) return A.type === 'rubble' ? -1 : 1; return A.hp - B.hp }); return n[0] }
        function getNeighbors(idx) { const n = [], x = idx % GRID_SIZE, y = Math.floor(idx / GRID_SIZE); if (y > 0) n.push(idx - GRID_SIZE); if (x < GRID_SIZE - 1) n.push(idx + 1); if (y < GRID_SIZE - 1) n.push(idx + GRID_SIZE); if (x > 0) n.push(idx - 1); return n }
        function getFacing(from, to) { const d = to - from; return d === -GRID_SIZE ? 0 : d === 1 ? 90 : d === GRID_SIZE ? 180 : d === -1 ? 270 : 0 }
        function renderAll() { ensureBounds(); renderPlot(); updateUI() }
        function renderPlot() { const grid = document.getElementById('tile-grid'), plot = state.plots[state.activePlot]; if (grid.children.length !== GRID_SIZE * GRID_SIZE) { grid.innerHTML = ''; for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) { const el = document.createElement('div'); el.className = 'tile'; el.dataset.index = i; el.onclick = () => onTileClick(i); el.ondragover = e => onDragOver(e, i); el.ondragleave = e => el.currentTarget && el.currentTarget.classList.remove('drag-over'); el.ondrop = e => onDrop(e, i); grid.appendChild(el) } } plot.tiles.forEach((tile, i) => { const el = grid.children[i]; el.className = `tile ${tile.type} ${el.classList.contains('drag-over') ? 'drag-over' : ''}`; let lvl = el.querySelector('.tile-level'), icon = el.querySelector('.tile-icon'), bar = el.querySelector('.hp-bar'), fill = el.querySelector('.hp-fill'); if (tile.type !== 'empty') { if (!lvl) { lvl = document.createElement('div'); lvl.className = 'tile-level'; el.appendChild(lvl) } lvl.textContent = `Lv.${tile.level}`; if (tile.type === 'rubble' && !icon) { icon = document.createElement('img'); icon.className = 'tile-icon'; icon.src = 'rubble-pile.svg'; el.appendChild(icon) } else if (tile.type !== 'rubble' && icon) icon.remove(); if (!bar) { bar = document.createElement('div'); bar.className = 'hp-bar'; fill = document.createElement('div'); fill.className = 'hp-fill'; bar.appendChild(fill); el.appendChild(bar) } bar.style.display = 'block'; fill.style.width = `${tile.maxHp ? (tile.hp / tile.maxHp) * 100 : 0}%` } else { if (lvl) lvl.remove(); if (icon) icon.remove(); if (bar) bar.style.display = 'none' } const miner = plot.miners.find(m => m.tileIndex === i); let mEl = el.querySelector('.miner'); if (miner) { if (!mEl) { mEl = document.createElement('div'); mEl.className = 'miner'; mEl.draggable = true; mEl.innerHTML = '<span class="miner-icon">⛏️</span><span class="miner-level"></span>'; mEl.onclick = e => { e.stopPropagation(); onMinerClick(miner) }; mEl.ondragstart = e => onDragStart(e, miner); mEl.ondragend = () => state.draggedMiner = null; el.appendChild(mEl) } mEl.className = `miner ${state.selectedMiner === miner ? 'selected' : ''}`; mEl.style.pointerEvents = state.draggedMiner === miner ? 'none' : 'auto'; mEl.style.opacity = state.draggedMiner === miner ? '.5' : '1'; mEl.style.transform = `rotate(${miner.facing || 0}deg)`; mEl.querySelector('.miner-level').textContent = miner.level } else if (mEl) mEl.remove() }) }
        function updateUI() { const plot = state.plots[state.activePlot]; document.getElementById('money-display').textContent = `$${Math.floor(state.money)}`; document.getElementById('loc-text').textContent = `Plot ${state.activePlot + 1}, Depth ${plot.depth}`; const total = plot.tiles.length, cleared = plot.tiles.filter(t => t.type === 'empty').length, rubble = plot.tiles.filter(t => t.type === 'rubble').length; document.getElementById('clear-text').textContent = `Cleared: ${Math.floor(cleared / total * 100)}%`; const cost = BASE_MINER_COST * Math.pow(1.5, plot.miners.length); const btn = document.getElementById('btn-buy-miner'); btn.textContent = `Buy Miner (Lvl 1) - $${Math.floor(cost)}`; btn.disabled = state.money < cost; document.getElementById('btn-buy-north').disabled = rubble !== 0 || state.money < 500; document.getElementById('btn-dig-down').disabled = cleared !== total; document.querySelectorAll('nav .nav-btn').forEach(b => { if (/Up|Down/.test(b.textContent)) b.disabled = true }) }
        function onMinerClick(miner) { if (state.selectedMiner === miner) state.selectedMiner = null; else if (state.selectedMiner && state.selectedMiner.level === miner.level && state.selectedMiner !== miner) { const plot = state.plots[state.activePlot]; plot.miners = plot.miners.filter(m => m !== state.selectedMiner); miner.level++; state.selectedMiner = null; spawnFloatText(miner.tileIndex, 'LEVEL UP!') } else state.selectedMiner = miner; renderPlot(); persist() }
        function onDropInternal(tileIndex) { const plot = state.plots[state.activePlot], existing = plot.miners.find(m => m.tileIndex === tileIndex), dragged = state.draggedMiner; if (existing && existing.level === dragged.level && existing !== dragged) { plot.miners = plot.miners.filter(m => m !== dragged); existing.level++; spawnFloatText(tileIndex, 'LEVEL UP!') } else if (!existing && plot.tiles[tileIndex].type === 'empty') { dragged.tileIndex = tileIndex } }
        function onDragStart(e, miner) { state.draggedMiner = miner; e.dataTransfer.setData('text/plain', '') }
        function onDragOver(e, i) { e.preventDefault(); if (!state.draggedMiner) return; const plot = state.plots[state.activePlot], target = plot.miners.find(m => m.tileIndex === i); if (plot.tiles[i].type === 'empty' || (target && target.level === state.draggedMiner.level && target !== state.draggedMiner)) { e.currentTarget.classList.add('drag-over'); e.dataTransfer.dropEffect = 'move' } }
        function onDrop(e, i) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (!state.draggedMiner) return; onDropInternal(i); state.draggedMiner = null; state.selectedMiner = null; renderAll(); persist() }
        function onTileClick(i) { const plot = state.plots[state.activePlot], existing = plot.miners.find(m => m.tileIndex === i); if (state.selectedMiner && !existing && plot.tiles[i].type === 'empty') { state.selectedMiner.tileIndex = i; state.selectedMiner = null; renderAll(); persist() } else if (!existing) { state.selectedMiner = null; renderAll() } }
        function buyMiner() { const plot = state.plots[state.activePlot], cost = BASE_MINER_COST * Math.pow(1.5, plot.miners.length); if (state.money < cost) return; const empties = plot.tiles.map((t, i) => t.type === 'empty' && !plot.miners.some(m => m.tileIndex === i) ? i : -1).filter(i => i !== -1); if (!empties.length) return alert('No room to place a miner.'); empties.sort((a, b) => Math.floor(b / GRID_SIZE) - Math.floor(a / GRID_SIZE)); state.money -= cost; plot.miners.push({ level: 1, tileIndex: empties[0], facing: 0 }); renderAll(); persist() }
        function navPlot(dir) { const target = state.activePlot + dir; if (target >= 0 && target <= state.maxUnlockedPlot) { state.activePlot = target; renderAll(); persist() } }
        function navDepth(dir) { const plot = state.plots[state.activePlot]; if (dir < 0 && plot.depth === 0) return }
        function buyNorthPlot() { if (state.money < 500) return; state.money -= 500; state.plots.push(initPlot(0)); state.maxUnlockedPlot++; state.activePlot = state.maxUnlockedPlot; renderAll(); persist() }
        function digDown() { const plot = state.plots[state.activePlot]; plot.depth++; plot.tiles = initPlot(plot.depth).tiles; const empties = plot.tiles.map((t, i) => t.type === 'empty' ? i : -1).filter(i => i !== -1); plot.miners.forEach((m, i) => m.tileIndex = empties[i % empties.length]); renderAll(); persist() }
        function spawnFloatText(idx, text) { const grid = document.getElementById('tile-grid'), tileEl = grid.children[idx]; if (!tileEl) return; const r = tileEl.getBoundingClientRect(), el = document.createElement('div'); el.className = 'float-text'; el.textContent = text; el.style.left = `${r.left + r.width / 2}px`; el.style.top = `${r.top}px`; document.body.appendChild(el); setTimeout(() => el.remove(), 1000) }
        function handleOfflineProgress(s) { const now = Date.now(), sec = (now - s.lastTick) / 1000; if (sec < 60) return; let earn = 0; s.plots.forEach(plot => { const rubbleCount = plot.tiles.filter(t => t.type === 'rubble').length; if (rubbleCount > 0) { const power = plot.miners.reduce((a, m) => a + Math.pow(2, m.level - 1), 0); earn += Math.min(power * sec * 0.1 * OFFLINE_RATE, rubbleCount * RUBBLE_VALUE) } }); s.money += earn }
        loadGame(); setInterval(gameTick, TICK_RATE); setInterval(persist, 5000); window.addEventListener('storage', e => { if (e.key === KEY) { state = loadGame(); renderAll() } });
    </script>
</body>

</html>
